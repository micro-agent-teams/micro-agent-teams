name: Build

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "backend/**"
  merge_group:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: backend/pom.xml
          # backend/.gitignore excludes settings.xml/toolchains.xml relative to
          # backend/ (this repo's original layout before it moved into a
          # monorepo subdirectory) — point setup-java there too, or the
          # spotless "uncommitted changes" check below sees them as untracked.
          settings-path: ${{ github.workspace }}/backend

      # Postgres only: nt no longer needs Elasticsearch (the modules that used
      # it were stripped) or the legacy NestJS service (cheese-auth is now a
      # separate repo/service, not something this build starts).
      - name: Start Postgres
        run: |
          docker run -d --name postgres \
            -e POSTGRES_PASSWORD=postgres \
            -p 5432:5432 \
            --health-cmd="pg_isready" \
            --health-interval=5s \
            --health-timeout=5s \
            --health-retries=10 \
            postgres
          for i in $(seq 1 30); do
            docker exec postgres pg_isready && break
            sleep 2
          done

      - name: Build with Maven
        run: ./mvnw install

      - name: Check uncommitted changes to ensure format applied
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git status
            echo "There are uncommitted changes. Please run './mvnw spotless:apply' and commit the changes."
            exit 1
          else
            echo "No uncommitted changes."
          fi

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: backend/target/*.jar

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/target/site/jacoco

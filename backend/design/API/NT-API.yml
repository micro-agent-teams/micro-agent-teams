openapi: 3.0.0
info:
  title: micro-agent-teams backend API
  version: "0.2"
servers:
  - url: "http://localhost:8080"
paths:
  /ping:
    get:
      operationId: ping
      summary: Authenticated health check (minimal example endpoint)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                required:
                  - code
                  - message

  # -- Chat threads ---------------------------------------------------------

  /threads:
    get:
      tags: [chat]
      operationId: listThreads
      summary: List threads the current user is a member of
      parameters:
        - name: page_start
          in: query
          schema:
            type: integer
            format: int64
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListThreadsResponse"
    post:
      tags: [chat]
      operationId: createThread
      summary: Create a thread (caller becomes owner)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateThreadRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Thread"

  /threads/{id}:
    get:
      tags: [chat]
      operationId: getThread
      summary: Get thread detail plus members
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreadDetail"
    patch:
      tags: [chat]
      operationId: renameThread
      summary: Rename a thread (admin+)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameThreadRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Thread"
    delete:
      tags: [chat]
      operationId: dissolveThread
      summary: Dissolve a thread (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Dissolved

  # -- Messages ------------------------------------------------------------

  /threads/{id}/messages:
    get:
      tags: [chat]
      operationId: listMessages
      summary: List messages with cursor pagination (member+)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page_start
          in: query
          description: id of the first message on the page (cursor)
          schema:
            type: integer
            format: int64
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMessagesResponse"
    post:
      tags: [chat]
      operationId: postMessage
      summary: Post a message to a thread (member+); persisted then broadcast via WebSocket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostMessageRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"


  /threads/{id}/members:
    get:
      tags: [chat]
      operationId: listThreadMembers
      summary: List a thread's members
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThreadMember"
    post:
      tags: [chat]
      operationId: addThreadMember
      summary: Add a member to a thread (admin+)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
      responses:
        "204":
          description: Added

  /threads/{id}/members/{userId}:
    delete:
      tags: [chat]
      operationId: removeThreadMember
      summary: Remove a member from a thread (admin+)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Removed
    patch:
      tags: [chat]
      operationId: changeThreadMemberRole
      summary: Change a thread member's role (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeRoleRequest"
      responses:
        "204":
          description: Role changed

  # -- Teams ----------------------------------------------------------------

  /teams:
    get:
      tags: [teams]
      operationId: listTeams
      summary: List teams the current user is a member of
      parameters:
        - name: role
          in: query
          description: Only teams where the caller has this role (OWNER/ADMIN/MEMBER)
          schema:
            type: string
        - name: page_start
          in: query
          description: id of the first team on the page (cursor)
          schema:
            type: integer
            format: int64
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTeamsResponse"
    post:
      tags: [teams]
      operationId: createTeam
      summary: Create a team (caller becomes owner)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{id}:
    get:
      tags: [teams]
      operationId: getTeam
      summary: Get team detail plus members
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamDetail"
    patch:
      tags: [teams]
      operationId: renameTeam
      summary: Rename a team (admin+)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameTeamRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
    delete:
      tags: [teams]
      operationId: deleteTeam
      summary: Delete a team (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Deleted

  /teams/{id}/members:
    get:
      tags: [teams]
      operationId: listTeamMembers
      summary: List a team's members
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      tags: [teams]
      operationId: addTeamMember
      summary: Add a member to a team (admin+)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTeamMemberRequest"
      responses:
        "204":
          description: Added

  /teams/{id}/members/{userId}:
    patch:
      tags: [teams]
      operationId: changeMemberRole
      summary: Change a member's role (admin+)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeRoleRequest"
      responses:
        "204":
          description: Role changed
    delete:
      tags: [teams]
      operationId: removeTeamMember
      summary: Remove a member from a team (admin+)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Removed

components:
  schemas:
    # -- Shared with existing code -----------------------------------------

    User:
      type: object
      required:
        - avatarId
        - id
        - intro
        - nickname
        - username
      properties:
        avatarId:
          description: avatar id
          type: integer
          format: int64
        id:
          description: user id
          format: int64
          minimum: 1
          type: integer
        intro:
          default: This user has not set an introduction yet.
          description: short bio
          type: string
        nickname:
          description: nickname
          type: string
        username:
          description: username
          type: string
    Page:
      type: object
      description: pagination info
      required:
        - page_start
        - page_size
        - has_prev
        - has_more
      properties:
        page_start:
          type: integer
          format: int64
          description: id of the first item on this page
        page_size:
          type: integer
          description: items per page
        has_prev:
          type: boolean
          description: whether a previous page exists
        prev_start:
          type: integer
          format: int64
          description: id of the first item on the previous page
        has_more:
          type: boolean
          description: whether a next page exists
        next_start:
          type: integer
          format: int64
          description: id of the first item on the next page
    ApproveType:
      description: approve status
      enum:
        - APPROVED
        - DISAPPROVED
        - NONE

    # -- Chat schemas (schema: mat, per MILESTONE-2-PLAN.md §3.1) ---------

    ListThreadsResponse:
      type: object
      required:
        - threads
        - page
      properties:
        threads:
          type: array
          items:
            $ref: "#/components/schemas/Thread"
        page:
          $ref: "#/components/schemas/Page"

    ListMessagesResponse:
      type: object
      required:
        - messages
        - page
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        page:
          $ref: "#/components/schemas/Page"

    Thread:
      type: object
      description: Chat thread (group or direct)
      required:
        - id
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ThreadDetail:
      type: object
      required:
        - thread
        - members
      properties:
        thread:
          $ref: "#/components/schemas/Thread"
        members:
          type: array
          items:
            $ref: "#/components/schemas/ThreadMember"

    ThreadMember:
      type: object
      description: A user's membership in a thread
      required:
        - id
        - threadId
        - userId
        - role
        - joinedAt
      properties:
        id:
          type: integer
          format: int64
        threadId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        role:
          type: string
          enum: [MEMBER, ADMIN, OWNER]
          description: 0=MEMBER, 1=ADMIN, 2=OWNER
          minimum: 0
          maximum: 2
        joinedAt:
          type: string
          format: date-time

    Message:
      type: object
      description: A chat message in a thread
      required:
        - id
        - threadId
        - senderId
        - content
        - type
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        threadId:
          type: integer
          format: int64
        senderId:
          type: integer
          format: int64
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        editedAt:
          type: string
          format: date-time

    # -- Request bodies ----------------------------------------------------

    CreateThreadRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        memberIds:
          type: array
          items:
            type: integer
            format: int64

    RenameThreadRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string

    PostMessageRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string

    AddMemberRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: integer
          format: int64
        role:
          type: string
          enum: [MEMBER, ADMIN, OWNER]

    ChangeRoleRequest:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum: [OWNER, ADMIN, MEMBER]

    # -- Teams -------------------------------------------------------------

    ListTeamsResponse:
      type: object
      required:
        - teams
        - page
      properties:
        teams:
          type: array
          items:
            $ref: "#/components/schemas/Team"
        page:
          $ref: "#/components/schemas/Page"

    Team:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TeamDetail:
      type: object
      properties:
        team:
          $ref: "#/components/schemas/Team"
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"

    TeamMember:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        nickname:
          type: string
        role:
          type: string
          enum: [OWNER, ADMIN, MEMBER]

    CreateTeamRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    RenameTeamRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    AddTeamMemberRequest:
      type: object
      required:
        - userId
        - role
      properties:
        userId:
          type: integer
          format: int64
        role:
          type: string
          enum: [OWNER, ADMIN, MEMBER]

